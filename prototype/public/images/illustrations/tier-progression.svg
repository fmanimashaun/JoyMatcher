<svg width="700" height="200" viewBox="0 0 700 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tierGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4D0052"/>
      <stop offset="100%" stop-color="#F16A6F"/>
    </linearGradient>
  </defs>

  <!-- Tier 1 -->
  <g transform="translate(20, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#tierGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="30" fill="#10B981" opacity="0.9"/>
    <text x="40" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">1</text>
    <text x="40" y="110" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Identity</text>
  </g>

  <!-- Arrow -->
  <path d="M110 100 L140 100" stroke="url(#tierGrad)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Tier 2 -->
  <g transform="translate(160, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#tierGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="30" fill="#8B5CF6" opacity="0.9"/>
    <text x="40" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">2</text>
    <text x="40" y="110" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Lifestyle</text>
  </g>

  <!-- Arrow -->
  <path d="M250 100 L280 100" stroke="url(#tierGrad)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Tier 3 -->
  <g transform="translate(300, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#tierGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="30" fill="#F16A6F" opacity="0.9"/>
    <text x="40" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">3</text>
    <text x="40" y="110" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Family</text>
  </g>

  <!-- Arrow -->
  <path d="M390 100 L420 100" stroke="url(#tierGrad)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Tier 4 -->
  <g transform="translate(440, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#tierGrad)" opacity="0.2"/>
    <circle cx="40" cy="40" r="30" fill="#F59E0B" opacity="0.9"/>
    <text x="40" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">4</text>
    <text x="40" y="110" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Health</text>
  </g>

  <!-- Arrow -->
  <path d="M530 100 L560 100" stroke="url(#tierGrad)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Tier 5 -->
  <g transform="translate(580, 60)">
    <circle cx="40" cy="40" r="38" fill="url(#tierGrad)" opacity="0.3"/>
    <circle cx="40" cy="40" r="30" fill="url(#tierGrad)" opacity="1"/>
    <text x="40" y="48" text-anchor="middle" fill="white" font-size="20" font-weight="bold">5</text>
    <text x="40" y="110" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Verified</text>
    <!-- Star badge -->
    <path d="M40 15 L43 25 L53 25 L45 31 L48 41 L40 35 L32 41 L35 31 L27 25 L37 25 Z"
          fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F16A6F"/>
    </marker>
  </defs>

  <!-- Trust building indicator -->
  <g transform="translate(250, 150)">
    <rect x="0" y="0" width="200" height="3" fill="#E5E7EB" rx="1.5"/>
    <rect x="0" y="0" width="200" height="3" fill="url(#tierGrad)" rx="1.5"/>
    <text x="100" y="20" text-anchor="middle" fill="#6B7280" font-size="11" font-style="italic">
      Progressive Trust Building →
    </text>
  </g>
</svg>

<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D0052"/>
      <stop offset="100%" stop-color="#F16A6F"/>
    </linearGradient>
  </defs>

  <!-- User A -->
  <g transform="translate(50, 50)">
    <circle cx="60" cy="60" r="50" fill="url(#brandGrad)" opacity="0.2"/>
    <circle cx="60" cy="60" r="35" fill="url(#brandGrad)" opacity="0.8"/>
    <text x="60" y="70" text-anchor="middle" fill="white" font-size="16" font-weight="bold">You</text>

    <!-- Tier indicators -->
    <g transform="translate(20, 130)">
      <rect x="0" y="0" width="80" height="25" rx="4" fill="url(#brandGrad)" opacity="0.3"/>
      <text x="40" y="17" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Tier 4</text>
    </g>
  </g>

  <!-- User B -->
  <g transform="translate(430, 50)">
    <circle cx="60" cy="60" r="50" fill="url(#brandGrad)" opacity="0.2"/>
    <circle cx="60" cy="60" r="35" fill="url(#brandGrad)" opacity="0.8"/>
    <text x="60" y="70" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Them</text>

    <!-- Tier indicators -->
    <g transform="translate(20, 130)">
      <rect x="0" y="0" width="80" height="25" rx="4" fill="url(#brandGrad)" opacity="0.3"/>
      <text x="40" y="17" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Tier 3</text>
    </g>
  </g>

  <!-- Connection arrows -->
  <path d="M160 110 L420 110" stroke="url(#brandGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M420 130 L160 130" stroke="url(#brandGrad)" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F16A6F"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F16A6F"/>
    </marker>
  </defs>

  <!-- Shared labels -->
  <text x="290" y="100" text-anchor="middle" fill="#6B7280" font-size="11">You shared: Tier 3</text>
  <text x="290" y="145" text-anchor="middle" fill="#6B7280" font-size="11">They shared: Tier 2</text>

  <!-- Result box -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="200" height="70" rx="8" fill="url(#brandGrad)" opacity="0.15"/>
    <rect x="5" y="5" width="190" height="60" rx="6" fill="white"/>
    <text x="100" y="25" text-anchor="middle" fill="#4D0052" font-size="12" font-weight="600">Effective Disclosure Tier</text>
    <text x="100" y="50" text-anchor="middle" fill="#4D0052" font-size="24" font-weight="bold">Tier 2</text>
  </g>

  <!-- Formula annotation -->
  <text x="300" y="285" text-anchor="middle" fill="#6B7280" font-size="10" font-style="italic">
    EDT = min(4, 3, 3, 2) = 2
  </text>
</svg>

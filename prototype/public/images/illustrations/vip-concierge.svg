<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D0052"/>
      <stop offset="100%" stop-color="#F16A6F"/>
    </linearGradient>
  </defs>

  <!-- Background elegant pattern -->
  <circle cx="250" cy="200" r="180" fill="url(#vipGrad)" opacity="0.05"/>
  <circle cx="250" cy="200" r="140" fill="url(#vipGrad)" opacity="0.05"/>

  <!-- Expert/Matchmaker in center -->
  <g transform="translate(215, 120)">
    <!-- Head with professional look -->
    <circle cx="35" cy="35" r="30" fill="url(#vipGrad)" opacity="0.9"/>

    <!-- Professional attire indicator -->
    <path d="M10 65 Q35 60 60 65 L60 110 Q35 115 10 110 Z" fill="url(#vipGrad)" opacity="0.8"/>

    <!-- Tie/professional detail -->
    <rect x="32" y="65" width="6" height="25" fill="#4D0052" opacity="0.6"/>

    <!-- Glasses (professional look) -->
    <circle cx="25" cy="32" r="6" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="45" cy="32" r="6" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="31" y1="32" x2="39" y2="32" stroke="white" stroke-width="1.5"/>

    <!-- Star badge (VIP indicator) -->
    <g transform="translate(55, 10)">
      <path d="M10 0 L12 8 L20 8 L14 13 L16 21 L10 16 L4 21 L6 13 L0 8 L8 8 Z"
            fill="#F16A6F" opacity="0.9"/>
    </g>
  </g>

  <!-- Client profiles around expert (4 profiles) -->
  <!-- Top left client -->
  <g transform="translate(80, 80)">
    <circle cx="20" cy="20" r="18" fill="url(#vipGrad)" opacity="0.6"/>
    <line x1="38" y1="20" x2="120" y2="145" stroke="#F16A6F" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- Top right client -->
  <g transform="translate(380, 80)">
    <circle cx="20" cy="20" r="18" fill="url(#vipGrad)" opacity="0.6"/>
    <line x1="20" y1="38" x2="260" y2="135" stroke="#F16A6F" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- Bottom left client -->
  <g transform="translate(80, 280)">
    <circle cx="20" cy="20" r="18" fill="url(#vipGrad)" opacity="0.6"/>
    <line x1="38" y1="20" x2="220" y2="205" stroke="#F16A6F" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- Bottom right client -->
  <g transform="translate(380, 280)">
    <circle cx="20" cy="20" r="18" fill="url(#vipGrad)" opacity="0.6"/>
    <line x1="20" y1="2" x2="260" y2="205" stroke="#F16A6F" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- Decorative elements showing curation -->
  <g transform="translate(150, 340)">
    <rect x="0" y="0" width="200" height="40" rx="20" fill="url(#vipGrad)" opacity="0.15"/>
    <text x="100" y="25" text-anchor="middle" fill="#4D0052" font-size="14" font-weight="600">
      Curated Matches
    </text>
  </g>

  <!-- Check marks indicating vetting -->
  <circle cx="140" cy="150" r="12" fill="#10B981" opacity="0.9"/>
  <path d="M135 150 L139 154 L145 146" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <circle cx="360" cy="150" r="12" fill="#10B981" opacity="0.9"/>
  <path d="M355 150 L359 154 L365 146" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

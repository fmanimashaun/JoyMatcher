<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D0052"/>
      <stop offset="100%" stop-color="#F16A6F"/>
    </linearGradient>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D0052" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F16A6F" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circles -->
  <circle cx="200" cy="200" r="180" fill="url(#lightGradient)"/>
  <circle cx="200" cy="200" r="140" fill="white" opacity="0.5"/>

  <!-- Left person (Female) -->
  <g transform="translate(120, 150)">
    <!-- Head -->
    <circle cx="30" cy="30" r="28" fill="url(#brandGradient)" opacity="0.8"/>
    <!-- Body -->
    <path d="M10 60 Q30 55 50 60 L50 120 Q30 125 10 120 Z" fill="url(#brandGradient)" opacity="0.7"/>
    <!-- Hair -->
    <path d="M30 5 Q20 10 15 20 Q10 30 15 35 Q15 15 30 5" fill="url(#brandGradient)"/>
    <path d="M30 5 Q40 10 45 20 Q50 30 45 35 Q45 15 30 5" fill="url(#brandGradient)"/>
  </g>

  <!-- Right person (Male) -->
  <g transform="translate(230, 150)">
    <!-- Head -->
    <circle cx="30" cy="30" r="28" fill="url(#brandGradient)" opacity="0.8"/>
    <!-- Body -->
    <path d="M10 60 Q30 55 50 60 L50 120 Q30 125 10 120 Z" fill="url(#brandGradient)" opacity="0.7"/>
    <!-- Hair -->
    <path d="M10 15 Q30 5 50 15 L50 25 Q30 20 10 25 Z" fill="url(#brandGradient)"/>
  </g>

  <!-- Heart symbol between them -->
  <g transform="translate(200, 180)">
    <path d="M0 10 C0 -5 -10 -10 -15 -5 C-20 0 -15 10 0 20 C15 10 20 0 15 -5 C10 -10 0 -5 0 10"
          fill="#F16A6F" opacity="0.9"/>
  </g>

  <!-- Connection lines -->
  <path d="M150 200 Q200 180 250 200" stroke="url(#brandGradient)" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Decorative dots -->
  <circle cx="100" cy="150" r="4" fill="#F16A6F" opacity="0.6"/>
  <circle cx="300" cy="150" r="4" fill="#4D0052" opacity="0.6"/>
  <circle cx="120" cy="280" r="3" fill="#F16A6F" opacity="0.4"/>
  <circle cx="280" cy="280" r="3" fill="#4D0052" opacity="0.4"/>
</svg>
